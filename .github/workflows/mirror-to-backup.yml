name: Mirror to backup (troncamp-board)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:                       # collapse bursts of 118 leaderboard pushes; only newest runs
  group: mirror-to-backup
  cancel-in-progress: true

jobs:
  mirror:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (source of truth)
        uses: actions/checkout@v4
        with: { path: src, fetch-depth: 1 }

      - name: Checkout backup repo
        uses: actions/checkout@v4
        with:
          repository: Weil-limx/troncamp-board
          ref: main
          token: ${{ secrets.BACKUP_MIRROR_TOKEN }}
          path: backup
          fetch-depth: 1

      - name: Sync main -> backup (exclude git/CI)
        run: |
          rsync -a --delete \
            --exclude '.git' --exclude '.github' \
            src/ backup/

      - name: Commit & push if changed
        working-directory: backup
        run: |
          git config user.name  "troncamp-mirror[bot]"
          git config user.email "troncamp-mirror@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to mirror."
          else
            SRC="${{ github.sha }}"
            git commit -m "mirror: sync from main@${SRC:0:7}"
            git push origin main
          fi
